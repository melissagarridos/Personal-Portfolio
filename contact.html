<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="Assets/briefcase.svg">
    <title>Melissa Garrido - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

    <!-- HEADER -->
    <header class="header">

        <a href="index.html" class="headerbtn" data-en="Home" data-es="Inicio">Home</a>
        <a href="about.html" class="headerbtn" data-en="About Me" data-es="Sobre mí">About Me</a>
        <a href="projects.html" class="headerbtn" data-en="Projects" data-es="Proyectos">Projects</a>
        <a href="contact.html" class="headerbtn active" data-en="Contact" data-es="Contacto">Contact</a>

        <button id="lang-toggle" class="lang-btn">ES</button>

    </header>

    <section class="contact-page" >

        <!-- TITLE -->
        <section class="center-title">
            <span>
                <span data-en="Contact" data-es="Contacto">Contact</span><span class="highlight">.</span>
            </span>
        </section>
    
    
        <!-- SUBTITLE -->
        <p class="center-subtitle" data-en="Have a project, collaboration, or opportunity in mind? Send me a message and I'll get back to you as soon as possible." data-es="¿Tienes un proyecto, colaboración u oportunidad en mente? Envíame un mensaje y te responderé lo antes posible.">
            Have a project, collaboration, or opportunity in mind?
            Send me a message and I'll get back to you as soon as possible.
        </p>
    
    
        <!-- FORM -->
        <section id="form">
    
            <form class="contact-form" id="contactForm" novalidate>
    
                <!-- NAME -->
                <div class="field">
                    <label for="name">
                        <span data-en="Full Name" data-es="Nombre Completo">Full Name</span>
                        <span class="highlight">*</span>
                    </label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Jane Doe"
                        required
                    >
                </div>
    
                <!-- EMAIL -->
                <div class="field">
                    <label for="email">
                        <span data-en="Email Address" data-es="Correo Electrónico">Email Address</span>
                        <span class="highlight">*</span>
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="jane@email.com"
                        required
                    >
                </div>
    
                <!-- PHONE -->
                <div class="field">
                    <label for="phone" data-en="Phone Number" data-es="Número de Teléfono">Phone Number</label>
                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        placeholder="+57 300 000 0000"
                    >
                </div>
    
                <!-- MESSAGE -->
                <div class="field">
                    <label for="message" data-en="What do you want to talk about?" data-es="¿De qué quieres hablar?">What do you want to talk about?</label>
                    <textarea
                        id="message"
                        name="message"
                        rows="6"
                        maxlength="500"
                        placeholder="Tell me about your project, goals, or how I can help..."
                    ></textarea>
                </div>
    
                <!-- BUTTON -->
                <div class="submit-row">
                    <button id="submitbtn" type="submit" data-en="Send Message →" data-es="Enviar Mensaje →">
                        Send Message →
                    </button>
                </div>
    
                <!-- SUCCESS MESSAGE -->
                <div class="success-msg" id="successMsg" data-en="✓ Your message has been sent successfully. I'll get back to you as soon as possible." data-es="✓ Tu mensaje ha sido enviado exitosamente. Te responderé lo antes posible.">
                    ✓ Your message has been sent successfully.
                    I'll get back to you as soon as possible.
                </div>
    
            </form>
    
        </section>
    
    
        <!-- CONTACT LINKS -->
        <section style="display:flex;justify-content:center;gap:24px;flex-wrap:wrap;padding:20px 20px 80px;">
    
            <a href="mailto:melissagarridosierra@gmail.com" class="cta-btn outline">
                <i class="fa-solid fa-envelope"></i>
                Email
            </a>
    
            <a href="https://www.linkedin.com/in/melissavgs/" target="_blank" rel="noopener" class="cta-btn outline">
                <i class="fa-brands fa-linkedin"></i>
                LinkedIn
            </a>
    
            <a href="https://github.com/melissagarridos" target="_blank" rel="noopener" class="cta-btn outline">
                <i class="fa-brands fa-github"></i>
                GitHub
            </a>
    
        </section>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="index.js"></script>

</body>
</html>
