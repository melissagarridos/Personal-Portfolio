<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio</title>
    <link rel="stylesheet" href="portafolio.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
</head>
<body>
    <header class="header">
        <a href="https://github.com/melissagarridos" id="github">github</a>
        <a href="https://www.linkedin.com/in/melissavgs/" id="linkedin">LinkedIn</a>

    </header>

    <section class="layout">

        <section class="grid1">

            <section id="inicio">
                <p id="presentacion">Hola 👋  Soy Melissa Garrido, Software Developer en formación 👩‍💻 </p>
            </section>
        </section>

        <section id="container" class="grid2">
        
            <div class="tarjeta">
                <img id="foto1" class="foto" src="https://www.opstechsolution.com/assets/images/about/web-design.png">
            </div>

            <div class="tarjeta">
                <img id="foto2" class="foto" src="https://media.licdn.com/dms/image/v2/D4E03AQF5n3IkqnI75g/profile-displayphoto-crop_800_800/B4EZnDzdpVIMAI-/0/1759926672415?e=1777507200&v=beta&t=p7f-b-WOZHny5On3AoYqKuNI0qDju6jweB8Dt9uaww8">
            </div>

            <section class="skills-cards">
                <p>The most recent brands I happily worked with</p>
            </section>

            <section id="skills">
                    <i class="fa-brands fa-python"></i>
                    <i class="fa-brands fa-html5"></i>
                    <i class="fa-brands fa-css"></i>
                    <i class="fa-brands fa-js"></i>
                    <i class="fa-solid fa-file-excel"></i>
            </section>

        </section>

    </section>

    <section class="footer">

            <nav id="menu"> 
                <section>
                    </ul>
                    <p>Contacto</p>
                    <form action="/enviar" method="post">
                        
                        <label for="nombre">Nombre</label>
                        <input type="text"
                            id="nombre"
                            name="nombre"
                            placeholder="Tu nombre"
                            required
                            minlength="2"
                            maxlength="50">

                        <label for="ciudad">Ciudad</label>
                        <select id="ciudad" name="ciudad" required>
                            <option value="">Selecciona...</option>
                            <option value="bog">Bogotá</option>
                            <option value="med">Medellín</option>
                            <option value="baq">Barranquilla</option>
                        </select>
                        
                        <label for="email">Email</label>
                        <input type="email"
                            id="email"
                            name="email"
                            placeholder="tu@email.com"
                            required>

                        <label for="telefono">Número de contacto</label>
                        <input type="tel"
                            id="telefono"
                            name="telefono"
                            placeholder="Ej: 3001234567"
                            required>

                        <button type="submit">Enviar formulario</button>

                    </form>
                    <a href="mascotas.html">
                        <button id="btn_mascotas">Mascotas</button>
                    </a>

                </section>
            </nav>
    </section> 
<script src="portafolio.js"></script>
</body>
</html>
